# Coffers runs as a standalone economy plugin.
# Vault support is optional and intended for legacy plugin compatibility only.
compatibility:
  vault-bridge: auto

runtime:
  schema-version: 1

storage:
  type: yaml
  yaml:
    accounts-file: accounts.yml
    history-file: history.yml
  sqlite:
    file: coffers.db
  mysql:
    host: localhost
    port: 3306
    database: coffers
    username: root
    password: change-me
    parameters: useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC

history:
  max-per-account: 50

currencies:
  default: coins
  definitions:
    coins:
      enabled: true
      singular: coin
      plural: coins
      symbol: "$"
      fractional-digits: 2
      starting-balance: 100.00
      format:
        symbol-first: true
        space-between-symbol-and-amount: false
        space-between-amount-and-name: true
        use-grouping: true
        show-trailing-zeros: true
    gems:
      enabled: true
      singular: gem
      plural: gems
      symbol: "◆"
      fractional-digits: 0
      starting-balance: 0
      format:
        symbol-first: false
        space-between-symbol-and-amount: true
        space-between-amount-and-name: true
        use-grouping: true
        show-trailing-zeros: false
